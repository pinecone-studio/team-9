name: CI — Workspace Checks

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'

  web:
    name: Web — Lint, Typecheck, Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend ESLint
        run: npm run lint:web

      - name: Run frontend TypeScript check
        run: npm run type-check:web

      - name: Build Next.js app
        run: npm run build:web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static-build
          path: apps/web/out/
          retention-days: 1

  api:
    name: API — Typecheck, Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend TypeScript check
        run: npm run type-check:api

  preview-web:
    name: Preview Deploy Web (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs:
      - changes
      - web
    if: github.event.pull_request.head.repo.fork == false && needs.changes.outputs.web == 'true'
    permissions:
      contents: read
      pull-requests: write
    env:
      CF_PAGES_PROJECT_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run build:pages

      - name: Resolve deploy target
        run: |
          set -euo pipefail

          normalize() {
            local v="$1"
            v="$(printf '%s' "$v" | tr '[:upper:]' '[:lower:]')"
            v="$(printf '%s' "$v" | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
            v="${v:0:58}"
            v="$(printf '%s' "$v" | sed -E 's/^-+//; s/-+$//')"
            printf '%s' "$v"
          }

          is_valid() {
            [[ "$1" =~ ^[a-z0-9]([a-z0-9-]{0,56}[a-z0-9])?$ ]]
          }

          raw="${CF_PAGES_PROJECT_NAME:-}"
          candidate="$(normalize "$raw")"

          if ! is_valid "$candidate"; then
            echo "::warning::Invalid CLOUDFLARE_PAGES_PROJECT_NAME; falling back to repository name."
            candidate="$(normalize "${GITHUB_REPOSITORY##*/}")"
          fi

          if ! is_valid "$candidate"; then
            echo "::error::Failed to derive a valid Cloudflare Pages project name."
            exit 1
          fi

          echo "DEPLOY_PROJECT_NAME=${candidate}" >> "$GITHUB_ENV"

      - name: Show deploy target
        run: |
          echo "Cloudflare account: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Cloudflare Pages project: ${{ env.DEPLOY_PROJECT_NAME }}"
          echo "Preview branch: ${{ github.head_ref }}"

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          PROJECT="${DEPLOY_PROJECT_NAME}"
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          COMPAT_DATE="$(date -u +%F)"

          echo "Checking Cloudflare Pages project: ${PROJECT}"
          STATUS="$(curl -sS -o /tmp/cf-project-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${API_BASE}/${PROJECT}")"

          if [ "${STATUS}" = "200" ] && grep -Eq '"success"[[:space:]]*:[[:space:]]*true' /tmp/cf-project-check.json; then
            echo "Project exists: ${PROJECT}"
          else
            echo "Project not found. Creating: ${PROJECT}"
            CREATE_RESPONSE="$(curl -sS -X POST "${API_BASE}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${PROJECT}\",\"production_branch\":\"main\",\"deployment_configs\":{\"preview\":{\"compatibility_date\":\"${COMPAT_DATE}\",\"compatibility_flags\":[\"nodejs_compat\"]},\"production\":{\"compatibility_date\":\"${COMPAT_DATE}\",\"compatibility_flags\":[\"nodejs_compat\"]}}}")"

            if echo "${CREATE_RESPONSE}" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true'; then
              echo "Project created: ${PROJECT}"
            else
              echo "::error::Failed to create Pages project '${PROJECT}'."
              echo "${CREATE_RESPONSE}"
              exit 1
            fi
          fi

          echo "Ensuring nodejs_compat is enabled for preview/production..."
          PATCH_RESPONSE="$(curl -sS -X PATCH "${API_BASE}/${PROJECT}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"deployment_configs\":{\"preview\":{\"compatibility_date\":\"${COMPAT_DATE}\",\"compatibility_flags\":[\"nodejs_compat\"]},\"production\":{\"compatibility_date\":\"${COMPAT_DATE}\",\"compatibility_flags\":[\"nodejs_compat\"]}}}")"

          if echo "${PATCH_RESPONSE}" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true'; then
            echo "Runtime config updated: nodejs_compat"
          else
            echo "::error::Failed to update runtime config (nodejs_compat) for '${PROJECT}'."
            echo "${PATCH_RESPONSE}"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages (Preview)
        id: cloudflare-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=${{ env.DEPLOY_PROJECT_NAME }} --branch=${{ github.head_ref }} --commit-dirty=true

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = "${{ steps.cloudflare-deploy.outputs.deployment-url }}";
            const branch = "${{ github.head_ref }}";
            const sha = "${{ github.sha }}".slice(0, 7);

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "## Web Preview Deployment",
                "",
                `| | |`,
                `|---|---|`,
                `| URL | ${deployUrl} |`,
                `| Branch | \`${branch}\` |`,
                `| Commit | \`${sha}\` |`
              ].join("\n")
            });

  preview-api:
    name: Preview Deploy API (Cloudflare Workers)
    if: github.event.pull_request.head.repo.fork == false && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    needs:
      - changes
      - api
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve API preview worker name
        run: |
          set -euo pipefail
          base="ebms-backend-pr-${{ github.event.pull_request.number }}"
          name="$(printf '%s' "$base" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
          name="${name:0:63}"
          name="$(printf '%s' "$name" | sed -E 's/^-+//; s/-+$//')"
          if [ -z "$name" ]; then
            echo "::error::Failed to derive API preview worker name."
            exit 1
          fi
          echo "API_PREVIEW_WORKER_NAME=$name" >> "$GITHUB_ENV"

      - name: Deploy API preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy --workspace @ebms/api -- --name=${{ env.API_PREVIEW_WORKER_NAME }}

      - name: Resolve API preview URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESPONSE="$(curl -sS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain")"

          SUBDOMAIN="$(printf '%s' "$RESPONSE" | node -e 'const fs=require("node:fs"); const d=JSON.parse(fs.readFileSync(0,"utf8")); process.stdout.write((d?.result?.subdomain ?? "").trim())')"

          if [ -z "$SUBDOMAIN" ]; then
            echo "::warning::Could not resolve workers.dev subdomain from Cloudflare API."
            echo "API_PREVIEW_URL=N/A" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "API_PREVIEW_URL=https://${API_PREVIEW_WORKER_NAME}.${SUBDOMAIN}.workers.dev" >> "$GITHUB_ENV"

      - name: Comment API preview info on PR
        uses: actions/github-script@v7
        with:
          script: |
            const worker = "${{ env.API_PREVIEW_WORKER_NAME }}";
            const url = "${{ env.API_PREVIEW_URL }}";
            const branch = "${{ github.head_ref }}";
            const sha = "${{ github.sha }}".slice(0, 7);

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "## API Preview Deployment",
                "",
                `| | |`,
                `|---|---|`,
                `| URL | ${url} |`,
                `| Worker | \`${worker}\` |`,
                `| Branch | \`${branch}\` |`,
                `| Commit | \`${sha}\` |`
              ].join("\n")
            });
