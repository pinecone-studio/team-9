query EligibilityRulesPageData {
  ruleDefinitions {
    id
    category_id
    category_name
    rule_type
    name
    description
    value_type
    allowed_operators_json
    options_json
    default_unit
    default_value
    default_operator
    is_active
    usage_count
    linked_benefits_json
  }
}

mutation CreateRuleApprovalRequest($input: CreateApprovalRequestInput!) {
  createApprovalRequest(input: $input) {
    id
    status
    target_role
  }
}

mutation UpdateRuleApprovalRequest($input: CreateApprovalRequestInput!) {
  createApprovalRequest(input: $input) {
    id
    status
    target_role
  }
}
mutation DeleteRuleDefinition($id: ID!) {
  deleteRuleDefinition(id: $id)
}
