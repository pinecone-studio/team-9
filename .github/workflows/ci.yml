name: CI - Lint, Build, Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-build-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_VERSION: '20'
      PAGES_OUTPUT_DIR: ${{ vars.PAGES_OUTPUT_DIR || 'out' }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Validate build output directory
        run: |
          if [ ! -d "${PAGES_OUTPUT_DIR}" ]; then
            echo "Build output directory '${PAGES_OUTPUT_DIR}' not found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.event.pull_request.number }}
          path: ${{ env.PAGES_OUTPUT_DIR }}

      - name: Deploy preview to Cloudflare Pages
        id: deploy_preview
        run: |
          set -euo pipefail
          npx wrangler@4 pages deploy "${PAGES_OUTPUT_DIR}" \
            --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch "pr-${{ github.event.pull_request.number }}" \
            --commit-hash "${{ github.sha }}" \
            --commit-message "PR #${{ github.event.pull_request.number }} preview" | tee /tmp/wrangler-preview.log

          PREVIEW_URL=$(grep -Eo 'https://[^ ]+pages.dev' /tmp/wrangler-preview.log | head -n1 || true)
          if [ -z "${PREVIEW_URL}" ]; then
            echo "Could not parse preview URL from wrangler output"
            exit 1
          fi

          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- ebms-preview-link -->';
            const body = `${marker}\n✅ CI passed (lint + build)\n\nPreview: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.data.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
