        run: bun run --cwd apps/api deploy -- --name=${{ env.API_WORKER_NAME }}

  deploy-prod:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
