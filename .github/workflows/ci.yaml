name: CI

on:
  pull_request:
    types: [labeled, synchronize]
    branches:
      - main
    paths-ignore:
      - ".nxignore"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-check-test:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'PR status: schema check')
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.45"

      - name: Install workspace dependencies
        run: bun install -y

      - name: Get NX BASE and NX HEAD
        uses: nrwl/nx-set-shas@v4

      - name: Export action env values
        run: |
          export NX_BASE=${{ env.NX_BASE }}
          export NX_HEAD=${{ env.NX_HEAD }}
          bash ./tools/scripts/export-action-env.sh

      - name: Run schema checks on affected projects (testing)
        run: bunx nx schema-check-affected-projects-testing tools

  schema-check-prod:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'PR status: schema check')
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.45"

      - name: Install workspace dependencies
        run: bun install -y

      - name: Get NX BASE and NX HEAD
        uses: nrwl/nx-set-shas@v4

      - name: Export action env values
        run: |
          export NX_BASE=${{ env.NX_BASE }}
          export NX_HEAD=${{ env.NX_HEAD }}
          bash ./tools/scripts/export-action-env.sh

      - name: Run schema checks on affected projects (prod)
        run: bunx nx schema-check-affected-projects-prod tools

  lint:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'PR status: code ready') ||
      contains(github.event.pull_request.labels.*.name, 'PR status: code ready parallel') ||
      contains(github.event.pull_request.labels.*.name, 'PR status: code ready with Playwright')
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.45"

      - run: bun install -y

      - name: Get NX BASE and NX HEAD
        uses: nrwl/nx-set-shas@v4

      - name: Export action env values
        run: |
          export NX_BASE=${{ env.NX_BASE }}
          export NX_HEAD=${{ env.NX_HEAD }}
          bash ./tools/scripts/export-action-env.sh

      - name: Run lint on affected projects
        run: bunx nx lint-affected-projects tools

  build:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'PR status: code ready') ||
      contains(github.event.pull_request.labels.*.name, 'PR status: code ready parallel') ||
      contains(github.event.pull_request.labels.*.name, 'PR status: code ready with Playwright')
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.45"

      - run: bun install -y

      - name: Get NX BASE and NX HEAD
        uses: nrwl/nx-set-shas@v4

      - name: Export action env values
        run: |
          export NX_BASE=${{ env.NX_BASE }}
          export NX_HEAD=${{ env.NX_HEAD }}
          bash ./tools/scripts/export-action-env.sh

      - name: Run build on affected projects
        run: bunx nx build-affected-projects tools

  preview:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.head.repo.fork == false &&
      contains(github.event.pull_request.labels.*.name, 'PR status: code ready')
    timeout-minutes: 50
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT_NAME: ${{ github.event.repository.name }}
      CF_WEB_WORKER_NAME: ${{ github.event.repository.name }}-web
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.45"

      - run: bun install -y

      - name: Get NX BASE and NX HEAD
        uses: nrwl/nx-set-shas@v4

      - name: Export action env values
        run: |
          export NX_BASE=${{ env.NX_BASE }}
          export NX_HEAD=${{ env.NX_HEAD }}
          export CLOUDFLARE_API_TOKEN=${{ env.CLOUDFLARE_API_TOKEN }}
          export CLOUDFLARE_ACCOUNT_ID=${{ env.CLOUDFLARE_ACCOUNT_ID }}
          export CLERK_SECRET_KEY=${{ env.CLERK_SECRET_KEY }}
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          
          bash ./tools/scripts/export-action-env.sh

      - name: Generate Preview Links
        run: bunx nx preview-action tools
