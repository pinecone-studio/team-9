name: EBMS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Lint frontend
        run: npm run lint -w packages/frontend

  # ─── Type check ──────────────────────────────────
  typecheck:
    name: 🔷 TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p packages/frontend/tsconfig.json

  # ─── Build ───────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build Next.js
        run: npm run build -w packages/frontend

      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: packages/frontend/.next/
          retention-days: 1

  # ─── Deploy Staging (develop branch) ─────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://ebms-staging.pages.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: packages/frontend/.next/

      - name: Deploy to Cloudflare Pages (staging)
        run: |
          npx wrangler pages deploy packages/frontend/.next \
            --project-name ebms-frontend \
            --branch staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Deploy Production (main branch) ─────────────
  deploy-production:
    name: 🏁 Deploy → Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://ebms.pages.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: packages/frontend/.next/

      - name: Deploy to Cloudflare Pages (production)
        run: |
          npx wrangler pages deploy packages/frontend/.next \
            --project-name ebms-frontend \
            --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}