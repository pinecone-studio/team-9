query EmployeesPage {
  employees {
    id
    name
    email
    position
    department
    employmentStatus
    hireDate
    responsibilityLevel
    okrSubmitted
    lateArrivalCount
  }
}

query EmployeeEligibility($employeeId: ID!) {
  employeeEligibility(employeeId: $employeeId) {
    status
    computedAt
    benefit {
      id
      title
      category
    }
  }
}

query EmployeeDashboardData($employeeId: ID!) {
  employee(id: $employeeId) {
    id
    employmentStatus
    responsibilityLevel
  }
  employeeEligibility(employeeId: $employeeId) {
    status
    computedAt
    ruleEvaluationJson
    overrideBy
    overrideReason
    benefit {
      approvalRole
      categoryId
      id
      isActive
      isCore
      requiresContract
      title
      description
      category
      subsidyPercent
      vendorName
    }
  }
  listBenefitEligibilitySummary {
    benefitId
    status
    rulesApplied
  }
  approvalRequests(status: pending) {
    entity_id
    entity_type
    action_type
    status
  }
}

query EmployeeBenefitRequests($employeeId: ID!) {
  benefitRequests(employeeId: $employeeId) {
    id
    status
    contractVersionAccepted
    contractAcceptedAt
    created_at
    updated_at
    approval_role
    employee {
      id
      name
      email
      position
    }
    benefit {
      id
      title
      category
    }
    reviewed_by {
      id
      name
      email
      position
    }
  }
}

query EmployeeBenefitDialog($benefitId: ID!, $employeeId: ID!) {
  benefitContract(benefitId: $benefitId) {
    id
    vendorName
    version
    r2ObjectKey
    effectiveDate
    expiryDate
    isActive
  }
  eligibilityRules(benefitId: $benefitId) {
    id
    name
    description
    error_message
    rule_type
    operator
    value
    default_unit
    priority
  }
  benefitRequests(employeeId: $employeeId, benefitId: $benefitId) {
    id
    status
    contractVersionAccepted
    contractAcceptedAt
    created_at
    updated_at
    approval_role
    employee {
      id
      name
      email
      position
    }
    benefit {
      id
      title
      category
    }
    reviewed_by {
      id
      name
      email
      position
    }
  }
}

query EmployeeDirectoryDialog($employeeId: ID!) {
  employee(id: $employeeId) {
    id
    name
    email
    position
    department
    employmentStatus
    hireDate
    responsibilityLevel
    okrSubmitted
    lateArrivalCount
  }
  employeeEligibility(employeeId: $employeeId) {
    status
    computedAt
    ruleEvaluationJson
    failedRuleMessages
    overrideBy
    overrideReason
    overrideExpiresAt
    benefit {
      id
      title
      category
      vendorName
      requiresContract
    }
  }
  benefitRequests(employeeId: $employeeId) {
    id
    status
    contractAcceptedAt
    created_at
    updated_at
    benefit {
      id
      title
      category
    }
    reviewed_by {
      id
      name
      email
      position
    }
  }
}

mutation RecalculateEmployeeEligibility($employeeId: ID!) {
  recalculateEmployeeEligibility(employeeId: $employeeId) {
    status
    computedAt
    ruleEvaluationJson
    overrideBy
    overrideReason
    benefit {
      approvalRole
      categoryId
      id
      isActive
      isCore
      requiresContract
      title
      description
      category
      subsidyPercent
      vendorName
    }
  }
}

mutation SubmitEmployeeBenefitRequest(
  $input: SubmitEmployeeBenefitRequestInput!
) {
  submitEmployeeBenefitRequest(input: $input) {
    id
    status
    contractVersionAccepted
    contractAcceptedAt
  }
}

mutation CancelEmployeeBenefitRequest(
  $input: CancelEmployeeBenefitRequestInput!
) {
  cancelEmployeeBenefitRequest(input: $input) {
    id
    status
    contractVersionAccepted
    contractAcceptedAt
  }
}

mutation OverrideEmployeeBenefitEligibility(
  $input: OverrideEmployeeBenefitEligibilityInput!
) {
  overrideEmployeeBenefitEligibility(input: $input) {
    status
    computedAt
    ruleEvaluationJson
    failedRuleMessages
    overrideBy
    overrideReason
    overrideExpiresAt
    benefit {
      id
      title
      category
      vendorName
      requiresContract
    }
  }
}
