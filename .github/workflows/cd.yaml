name: CD — Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false # production-д queue хийнэ

jobs:
  # ─────────────────────────────────────────
  # PRODUCTION DEPLOY
  # ─────────────────────────────────────────
  deploy-production:
    name: 🌐 Deploy → Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (sanity check)
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build for Cloudflare Pages
        run: npm run build:cf
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages (Production)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main

      - name: Output deployment URL
        run: |
          echo "✅ Production deployed: ${{ steps.deploy.outputs.deployment-url }}"
