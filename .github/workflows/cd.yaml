          fi

      - name: Deploy web to testing
        if: steps.affected.outputs.web == 'true' && steps.web_export.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
