name: CI — Lint, Build & Preview

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check
        # package.json дотор: "type-check": "tsc --noEmit"

  # ─────────────────────────────────────────────
  # JOB 2: Build
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Cloudflare Pages Preview Deploy
  # ─────────────────────────────────────────────
  preview:
    name: 🚀 Preview Deploy (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read # actions/checkout-д репо унших эрх хэрэгтэй
      pull-requests: write # PR дээр comment бичихэд хэрэгтэй

    env:
      # Prefer secret, then variable; fallback to repository name.
      CF_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME != '' && secrets.CLOUDFLARE_PAGES_PROJECT_NAME || vars.CLOUDFLARE_PAGES_PROJECT_NAME != '' && vars.CLOUDFLARE_PAGES_PROJECT_NAME || github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run build:pages
        # package.json: "build:pages": "npx @cloudflare/next-on-pages"

      - name: Show deploy target
        run: |
          echo "Cloudflare account: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Cloudflare Pages project: ${{ env.CF_PAGES_PROJECT_NAME }}"
          echo "Preview branch: ${{ github.head_ref }}"

      - name: Validate deploy target
        run: |
          if [ -z "${{ env.CF_PAGES_PROJECT_NAME }}" ]; then
            echo "::error::Cloudflare Pages project name is empty. Set CLOUDFLARE_PAGES_PROJECT_NAME in Secrets or Variables."
            exit 1
          fi

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          PROJECT="${CF_PAGES_PROJECT_NAME}"
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"

          echo "Checking Cloudflare Pages project: ${PROJECT}"
          STATUS="$(curl -sS -o /tmp/cf-project-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${API_BASE}/${PROJECT}")"

          if [ "${STATUS}" = "200" ] && grep -q '"success":true' /tmp/cf-project-check.json; then
            echo "Project exists: ${PROJECT}"
          else
            echo "Project not found. Creating: ${PROJECT}"
            CREATE_RESPONSE="$(curl -sS -X POST "${API_BASE}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${PROJECT}\",\"production_branch\":\"main\"}")"

            if echo "${CREATE_RESPONSE}" | grep -q '"success":true'; then
              echo "Project created: ${PROJECT}"
            else
              echo "::error::Failed to create Pages project '${PROJECT}'."
              echo "${CREATE_RESPONSE}"
              exit 1
            fi
          fi

      - name: Deploy to Cloudflare Pages (Preview)
        id: cloudflare-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ env.CF_PAGES_PROJECT_NAME }} --branch=${{ github.head_ref }} --commit-dirty=true
          # @cloudflare/next-on-pages ашиглавал: out/ эсвэл .vercel/output/static

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = "${{ steps.cloudflare-deploy.outputs.deployment-url }}";
            const branch = "${{ github.head_ref }}";
            const sha = "${{ github.sha }}".slice(0, 7);

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "## 🚀 Cloudflare Pages Preview",
                "",
                `| | |`,
                `|---|---|`,
                `| **Preview URL** | ${deployUrl} |`,
                `| **Branch** | \`${branch}\` |`,
                `| **Commit** | \`${sha}\` |`,
                "",
                "> Preview автоматаар байршуулагдлаа ✅"
              ].join("\n")
            });
