name: CD

on:
  pull_request:
    types:
      - closed

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  deploy-dev:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT_NAME: ${{ github.event.repository.name }}-dev
      API_WORKER_NAME: ebms-backend-dev
      NEXT_PUBLIC_GRAPHQL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_GRAPHQL_ENDPOINT_DEV }}
      DEPLOY_BRANCH: develop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.1.45'

      - run: bun install -y

      - name: Detect affected apps
        id: affected
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          AFFECTED="$(bunx nx show projects --affected --base="${BASE_SHA}" --head="${HEAD_SHA}" --json)"
          node -e 'const fs=require("node:fs");const out=process.env.GITHUB_OUTPUT;const affected=JSON.parse(process.argv[1]);fs.appendFileSync(out,`web=${affected.includes("ebms-web")}\n`);fs.appendFileSync(out,`api=${affected.includes("ebms-api")}\n`);' "${AFFECTED}"

      - name: Resolve GraphQL endpoint
        if: steps.affected.outputs.web == 'true'
        run: |
          set -euo pipefail
          if [ -n "${NEXT_PUBLIC_GRAPHQL_ENDPOINT:-}" ]; then
            echo "NEXT_PUBLIC_GRAPHQL_ENDPOINT=${NEXT_PUBLIC_GRAPHQL_ENDPOINT}" >> "$GITHUB_ENV"
            exit 0
          fi

          RESPONSE="$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain")"
          SUBDOMAIN="$(node -e 'const data=JSON.parse(process.argv[1]); process.stdout.write(data?.result?.subdomain || "");' "${RESPONSE}")"
          if [ -z "${SUBDOMAIN}" ]; then
            echo "Unable to resolve Cloudflare Workers subdomain."
            echo "${RESPONSE}"
            exit 1
          fi

          echo "NEXT_PUBLIC_GRAPHQL_ENDPOINT=https://${API_WORKER_NAME}.${SUBDOMAIN}.workers.dev/graphql" >> "$GITHUB_ENV"

      - name: Build web
        if: steps.affected.outputs.web == 'true'
        run: bunx nx run ebms-web:build-pages

      - name: Detect static export output
        if: steps.affected.outputs.web == 'true'
        id: web_export
        run: |
          if [ -d apps/web/out ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Cloudflare Pages deploy because apps/web/out was not generated."
          fi

      - name: Resolve deploy target
        if: steps.affected.outputs.web == 'true' && steps.web_export.outputs.available == 'true'
        run: |
          set -euo pipefail
          normalize() {
            local v="$1"
            v="$(printf '%s' "$v" | tr '[:upper:]' '[:lower:]')"
            v="$(printf '%s' "$v" | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
            v="${v:0:58}"
            v="$(printf '%s' "$v" | sed -E 's/^-+//; s/-+$//')"
            printf '%s' "$v"
          }
          echo "DEPLOY_PROJECT_NAME=$(normalize "${CF_PAGES_PROJECT_NAME}")" >> "$GITHUB_ENV"

      - name: Ensure Cloudflare Pages project exists
        if: steps.affected.outputs.web == 'true' && steps.web_export.outputs.available == 'true'
        run: |
          set -euo pipefail
          PROJECT="${DEPLOY_PROJECT_NAME}"
          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          COMPAT_DATE="$(date -u +%F)"
          STATUS="$(curl -sS -o /tmp/cf-project-check.json -w "%{http_code}" -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${API_BASE}/${PROJECT}")"

          if [ "${STATUS}" != "200" ] || ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true' /tmp/cf-project-check.json; then
            curl -sS -X POST "${API_BASE}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${PROJECT}\",\"production_branch\":\"main\",\"deployment_configs\":{\"preview\":{\"compatibility_date\":\"${COMPAT_DATE}\",\"compatibility_flags\":[\"nodejs_compat\"]},\"production\":{\"compatibility_date\":\"${COMPAT_DATE}\",\"compatibility_flags\":[\"nodejs_compat\"]}}}" >/tmp/cf-create.json
          fi

      - name: Deploy web to development
        if: steps.affected.outputs.web == 'true' && steps.web_export.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=${{ env.DEPLOY_PROJECT_NAME }} --branch=${{ env.DEPLOY_BRANCH }} --commit-dirty=true

      - name: Deploy API to development
        if: steps.affected.outputs.api == 'true'
        run: bun run --cwd apps/api deploy -- --name=${{ env.API_WORKER_NAME }}

