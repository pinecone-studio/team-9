name: CI — Lint, Build & Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ci-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: |
          if npm run | grep -q "type-check"; then
            npm run type-check
          elif npm run | grep -q "typecheck"; then
            npm run typecheck
          else
            echo "No TypeScript check script found (type-check/typecheck). Skipping."
          fi

  build-and-preview:
    name: 🚀 Build & Preview Deploy
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (Next.js + Cloudflare Pages)
        run: npm run build

      - name: Deploy Preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy .vercel/output/static --project-name=frontend --branch=${{ github.head_ref }}

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = "${{ steps.deploy.outputs.deployment-url }}";
            const aliasUrl = "${{ steps.deploy.outputs.pages-deployment-alias-url }}";
            const url = aliasUrl || deploymentUrl;
            const sha = "${{ github.sha }}".slice(0, 7);
            const marker = "<!-- cf-preview-comment -->";
            const body = [
              marker,
              "## 🚀 Cloudflare Pages Preview",
              "",
              `- URL: ${url}`,
              `- Branch: \`${{ github.head_ref }}\``,
              `- Commit: \`${sha}\``,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
